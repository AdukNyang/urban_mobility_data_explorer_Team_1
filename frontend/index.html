<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NYC Urban Mobility Data Explorer</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>NYC Urban Mobility Data Explorer</h1>
        <p>January 2019 — Yellow Taxi Trip Records</p>
    </header>
    <section class="filters">
        <select id="boroughFilter">
            <option value="all">All Boroughs</option>
        </select>
        <select id="paymentFilter">
            <option value="all">All Payments</option>
        </select>
        <button id="resetBtn">Reset</button>
    </section>

    <section class="kpi-cards">
        <div class="card"><p>Total Trips</p><h2 id="totalTrips">—</h2></div>
        <div class="card"><p>Average Fare</p><h2 id="avgFare">—</h2></div>
        <div class="card"><p>Average Distance</p><h2 id="avgDistance">—</h2></div>
        <div class="card"><p>Average Duration</p><h2 id="avgDuration">—</h2></div>
        <div class="card"><p>Airport Trips</p><h2 id="airportTrips">—</h2></div>
    </section>

    <section class="map-section">
        <h2>Trip Density by Zone</h2>
        <div id="map"></div>
        <p id="avgSpeed"></p>
    </section>

    <section class="charts">
        <div class="chart-box">
            <div class="chart-toggle">
                <button class="toggle-btn active" id="byHourBtn">By Hour</button>
                <button class="toggle-btn" id="byDayBtn">By Day</button>
            </div>
            <canvas id="tripPatternChart"></canvas>
        </div>
        <div class="chart-box">
            <div class="chart-toggle">
                <button class="toggle-btn active" id="fareBtn">Fare Distribution</button>
                <button class="toggle-btn" id="paymentBtn">Payment Types</button>
            </div>
            <canvas id="farePaymentChart"></canvas>
        </div>
        <div class="chart-box"><canvas id="topZonesChart"></canvas></div>
        <div class="chart-box"><canvas id="airportChart"></canvas></div>
    </section>

    <script src="js/app.js"></script>

    <footer>
        <p>NYC TLC Yellow Taxi Data — Team 1 &copy; 2026</p>
    </footer>
</body>
</html>
